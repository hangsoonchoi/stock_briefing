name: Daily Market Briefing

on:
  schedule:
    # UTC 22:30 = KST 다음날 07:30 (월~금 KST)
    - cron: '30 22 * * 0-4'
  workflow_dispatch:  # 수동 실행 가능

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run briefing
        env:
          PUBLISH_MODE: web
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_APP_PASSWORD: ${{ secrets.SENDER_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd stock_briefing
          python main.py

      # docs/ 폴더 변경사항을 자동 커밋 → GitHub Pages 자동 갱신
      - name: Commit docs (GitHub Pages)
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stock_briefing/docs/ stock_briefing/archive/ || true
          git commit -m "Daily briefing $(date -u +'%Y-%m-%d') [skip ci]" || echo "No changes"
          git push || echo "Nothing to push"
