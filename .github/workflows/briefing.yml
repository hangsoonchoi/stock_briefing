name: Market Briefing

on:
  schedule:
    # 풀 모드 — KST 평일 07:30 (UTC 일~목 22:30)
    - cron: '30 22 * * 0-4'
    # 단타 모드 — KST 평일 08:00 (UTC 일~목 23:00)
    - cron: '0 23 * * 0-4'
    # 단타 모드 — KST 평일 09:00~18:00 매시 (UTC 월~금 0:00~9:00)
    - cron: '0 0-9 * * 1-5'
  workflow_dispatch:  # 수동 실행 가능

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run briefing (통합 모드)
        env:
          PUBLISH_MODE: web
          BRIEF_MODE: full
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_APP_PASSWORD: ${{ secrets.SENDER_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      # docs/ 폴더 변경사항을 자동 커밋 → GitHub Pages 자동 갱신
      # 시간 스탬프 파일이 매 실행마다 생성되어 비교 가능 (덮어쓰기 X)
      - name: Commit docs (GitHub Pages)
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ archive/ || true
          TIMESTAMP=$(TZ="Asia/Seoul" date +'%Y-%m-%d %H:%M KST')
          git commit -m "Briefing ${TIMESTAMP} [skip ci]" || echo "No changes"
          git push || echo "Nothing to push"
