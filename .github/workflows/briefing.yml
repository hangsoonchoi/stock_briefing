name: Market Briefing

on:
  schedule:
    # KST 평일 07:30 / 10:30 / 13:30 / 16:30 — 4슬롯
    # GitHub Actions 무료 cron 은 부하 시 30분 지연 + 일부 스킵 정책 →
    # 슬롯마다 3개씩 백업 cron(같은 30분 안에 줄줄이 시도) +
    # main.py 의 30분 락이 두 번째 이후 즉시 종료 → 비용 낭비 X, 신뢰성 ↑
    #
    # 슬롯 1 — KST 07:30 (UTC 22:30 일~목)
    - cron: '30 22 * * 0-4'
    - cron: '40 22 * * 0-4'
    - cron: '50 22 * * 0-4'
    # 슬롯 2 — KST 10:30 (UTC 01:30 월~금)
    - cron: '30 1 * * 1-5'
    - cron: '40 1 * * 1-5'
    - cron: '50 1 * * 1-5'
    # 슬롯 3 — KST 13:30 (UTC 04:30 월~금)
    - cron: '30 4 * * 1-5'
    - cron: '40 4 * * 1-5'
    - cron: '50 4 * * 1-5'
    # 슬롯 4 — KST 16:30 (UTC 07:30 월~금)
    - cron: '30 7 * * 1-5'
    - cron: '40 7 * * 1-5'
    - cron: '50 7 * * 1-5'
  workflow_dispatch:  # 수동 실행 가능

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run briefing (통합 모드)
        env:
          PUBLISH_MODE: web
          BRIEF_MODE: full
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_APP_PASSWORD: ${{ secrets.SENDER_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      # docs/ 폴더 변경사항을 자동 커밋 → GitHub Pages 자동 갱신
      # 시간 스탬프 파일이 매 실행마다 생성되어 비교 가능 (덮어쓰기 X)
      - name: Commit docs (GitHub Pages)
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ archive/ || true
          TIMESTAMP=$(TZ="Asia/Seoul" date +'%Y-%m-%d %H:%M KST')
          git commit -m "Briefing ${TIMESTAMP} [skip ci]" || echo "No changes"
          git push || echo "Nothing to push"
