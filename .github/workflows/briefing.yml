name: Market Briefing

on:
  schedule:
    # 풀 모드 — KST 평일 07:30 (UTC 일~목 22:30)
    - cron: '30 22 * * 0-4'
    # 단타 모드 — KST 평일 08:00 (UTC 일~목 23:00)
    - cron: '0 23 * * 0-4'
    # 단타 모드 — KST 평일 09:00~18:00 매시 (UTC 월~금 0:00~9:00)
    - cron: '0 0-9 * * 1-5'
  workflow_dispatch:  # 수동 실행 가능
    inputs:
      mode:
        description: '실행 모드'
        type: choice
        options:
          - full
          - quick
        default: full

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Determine BRIEF_MODE
        id: mode
        run: |
          MODE="full"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode }}"
          elif [ "${{ github.event.schedule }}" = "30 22 * * 0-4" ]; then
            MODE="full"
          else
            MODE="quick"
          fi
          echo "BRIEF_MODE=$MODE" >> $GITHUB_ENV
          echo "Running in $MODE mode"

      - name: Run briefing
        env:
          PUBLISH_MODE: web
          BRIEF_MODE: ${{ env.BRIEF_MODE }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_APP_PASSWORD: ${{ secrets.SENDER_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      # docs/ 폴더 변경사항을 자동 커밋 → GitHub Pages 자동 갱신
      - name: Commit docs (GitHub Pages)
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ archive/ || true
          git commit -m "Daily briefing $(date -u +'%Y-%m-%d') [skip ci]" || echo "No changes"
          git push || echo "Nothing to push"
